<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .islamic-pattern {
            background-color: #f9f9ff;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l2.5 12.5L45 15l-12.5 2.5L30 30l-2.5-12.5L15 15l12.5-2.5z' fill='%23006948' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
    </style>

<body class="bg-background font-body text-on-surface antialiased min-h-screen flex items-center justify-center p-6 islamic-pattern">
<!-- Top Navigation (Shell suppressed for transactional page but logo logic used) -->
<header class="fixed top-0 left-0 w-full p-8 flex justify-center md:justify-start pointer-events-none">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="account_balance">account_balance</span>
<span class="text-2xl font-bold text-primary italic font-headline tracking-tight">Tanya Ustadz</span>
</div>
</header>
<main class="w-full max-w-md">
<!-- Secure Gate Card -->
<div class="glass-card rounded-[2.5rem] p-8 md:p-12 shadow-[0px_12px_32px_rgba(20,28,43,0.06)] flex flex-col items-center text-center relative overflow-hidden">
<!-- Visual Accent -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-1 bg-gradient-to-r from-transparent via-primary/20 to-transparent"></div>
<!-- Lock Icon Container -->
<div class="w-20 h-20 bg-secondary-container text-on-secondary-container rounded-full flex items-center justify-center mb-8">
<span class="material-symbols-outlined text-4xl" data-icon="lock_person" style="font-variation-settings: 'FILL' 1;">lock_person</span>
</div>
<!-- Content Hierarchy -->
<h1 class="font-headline text-3xl font-extrabold text-on-surface mb-3 tracking-tight">
                Akses Terbatas
            </h1>
<p class="font-body text-on-surface-variant text-sm md:text-base leading-relaxed mb-10 px-2">
                Silakan masukkan kata sandi untuk melanjutkan ke panel ustadz.
            </p>
<!-- Access Form -->
<form class="w-full space-y-6">
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="key">key</span>
</div>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low border-none rounded-2xl focus:ring-2 focus:ring-primary/20 transition-all text-on-surface placeholder:text-outline/60 font-medium" placeholder="Masukkan Kata Sandi" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-white font-bold rounded-2xl shadow-[0px_8px_24px_rgba(0,105,72,0.25)] hover:shadow-[0px_12px_32px_rgba(0,105,72,0.35)] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined" data-icon="verified_user">verified_user</span>
                    Buka Akses
                </button>
</form>
<!-- Security Notice -->
<div class="mt-8 flex items-center gap-2 text-[11px] font-semibold uppercase tracking-[0.1em] text-outline/60">
<span class="material-symbols-outlined text-[14px]" data-icon="shield">shield</span>
                Sistem Terenkripsi
            </div>
</div>
<!-- Footer Actions -->
<div class="mt-10 text-center space-y-4">
<p class="text-sm font-medium text-on-surface-variant">
                Lupa kata sandi? 
                <a class="text-primary hover:underline underline-offset-4 decoration-primary/30 transition-all font-semibold ml-1" href="#">
                    Hubungi Admin IT.
                </a>
</p>
<div class="flex justify-center gap-6 pt-4">
<div class="flex items-center gap-1.5 opacity-40 grayscale">
<img alt="security verification logo" class="h-6 w-auto" data-alt="minimalist clean security seal icon in grayscale showing a lock and a shield symbol" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBIrB1--Gv8BweDs67vlf0ul6ukqVQ6eW-ojZOJGQUFx6ApIfJ4dlgzNaSuNUt1gHi0Sp_XzEtdcCZ0N-znXioaYqOQL3zMKOs7i7b48Mil6XD9bPnC-oNgLmhFl4N7g3HIE2KyPLvaQ_-Gz5Uu8hUl_XdIar6et6f2yC1NO0YBW083pc5fpLcyyiSOT9iy39yf-HH6enM_XAmePKSQlKpEwL2QoPd1Flppjp0OY8oDrPh4uxnzkrS3kfFiRqTYT-l4Yd_HBoQ58T4"/>
</div>
</div>
</div>
</main>
<!-- Decorative Bottom Gradient -->
<div class="fixed bottom-0 left-0 w-full h-32 bg-gradient-to-t from-primary/5 to-transparent pointer-events-none"></div>
<!-- Background Illustration Detail -->
<div class="fixed -bottom-20 -right-20 w-80 h-80 opacity-[0.03] pointer-events-none">
<span class="material-symbols-outlined text-[320px] text-primary" data-icon="auto_awesome">auto_awesome</span>
</div>
<div class="fixed -top-20 -left-20 w-80 h-80 opacity-[0.03] pointer-events-none rotate-45">
<span class="material-symbols-outlined text-[320px] text-primary" data-icon="star_rate" style="font-variation-settings: 'FILL' 1;">star_rate</span>
</div>
</body></html>
