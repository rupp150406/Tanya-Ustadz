<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifikasi Alert Tanya Ustadz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .alert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .alert-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .alert-card {
            background: white;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transform: scale(0.9);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .alert-overlay.active .alert-card {
            transform: scale(1);
        }

        .alert-header {
            background-color: #006948; /* Match red from reference */
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .alert-content {
            padding: 32px 24px;
            text-align: center;
        }

        .alert-title {
            font-size: 24px;
            font-weight: 800;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .alert-message {
            font-size: 16px;
            color: #6b7280;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .alert-button {
            background-color: #006948;
            color: white;
            font-weight: 700;
            padding: 12px 48px;
            border-radius: 9999px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .alert-button:hover {
            background-color: #006948;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 105, 72, 0.3);
        }

        .alert-button:active {
            transform: translateY(0);
        }

        .lottie-container {
            width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>

    <!-- Tombol Trigger untuk demo -->
    <button onclick="showAlert()" class="bg-emerald-600 text-white px-6 py-3 rounded-lg font-bold shadow-lg hover:bg-emerald-700 transition-all">
        Test Notifikasi Alert
    </button>

    <!-- Komponen Alert -->
    <div id="customAlert" class="alert-overlay">
        <div class="alert-card">
            <div class="alert-header">
                <!-- Animasi Lottie -->
                <div class="lottie-container">
                    <iframe src="https://lottie.host/embed/90176d91-4978-4297-812d-178a24962b88/MDQJhvWqPS.lottie" style="border: none; width: 100%; height: 100%;"></iframe>
                </div>
            </div>
            <div class="alert-content">
                <h2 class="alert-title">Warning!</h2>
                <p class="alert-message">Terjadi kesalahan saat mencoba mengirimkan pertanyaan Anda. Silakan coba beberapa saat lagi.</p>
                <button onclick="closeAlert()" class="alert-button">Close</button>
            </div>
        </div>
    </div>

    <script>
        function showAlert() {
            document.getElementById('customAlert').classList.add('active');
        }

        function closeAlert() {
            document.getElementById('customAlert').classList.remove('active');
        }

        // Menutup alert jika user mengklik area di luar card
        window.onclick = function(event) {
            const overlay = document.getElementById('customAlert');
            if (event.target == overlay) {
                closeAlert();
            }
        }
    </script>

</body>
</html>
